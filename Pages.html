<style>
/* Dropdown */
.dropdown{
    position: relative;
}

.dropdown-menu{
    position: absolute;
    top: 100%;
    left: 0;
    width: 220px;
    background: #fff;
    box-shadow: 0 5px 20px rgba(0,0,0,.1);
    list-style: none;
    display: none;
    z-index: 100;
}

.dropdown-menu li{
    border-bottom: 1px solid #eee;
}

.dropdown-menu li:last-child{
    border-bottom: none;
}

.dropdown-menu li a{
    display: block;
    padding: 15px 20px;
    color: #333;
    transition: .3s;
}

.dropdown-menu li a:hover{
    background: #ff4d00;
    color: white;
}

.dropdown:hover .dropdown-menu{
    display: block;
}
</style>
</head>
